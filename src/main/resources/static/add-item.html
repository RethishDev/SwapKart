<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}" th:if="${_csrf}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}" th:if="${_csrf}">
    <title>Add Item - SwapKart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- SweetAlert2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <style>
        .preview-image { width: 100px; height: 100px; object-fit: cover; margin: 5px; border-radius: 5px; }
        .preview-container { display: flex; flex-wrap: wrap; margin: 10px 0; }
        .form-container { max-width: 800px; margin: 2rem auto; padding: 2rem; background: #fff; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        .required:after { content: " *"; color: #dc3545; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">SwapKart</a>
            <a href="/items" class="btn btn-outline-light ms-auto me-2">Back to Browse</a>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2 class="mb-4">List a New Item</h2>
            <form id="addItemForm" th:action="" method="post" enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="title" class="form-label required">Title</label>
                        <input type="text" class="form-control" id="title" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="type" class="form-label required">Type</label>
                        <select class="form-select" id="type" required>
                            <option value="">Select type</option>
                            <option value="SWAP">Swap</option>
                            <option value="SELL">Sell</option>
                            <option value="DONATE">Donate</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label required">Description</label>
                    <textarea class="form-control" id="description" rows="3" required></textarea>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="category" class="form-label required">Category</label>
                        <select class="form-select" id="category" required>
                            <option value="">Select category</option>
                            <option value="Furniture">Furniture</option>
                            <option value="Electronic">Electronic</option>
                            <option value="CLOTHING">Clothing</option>
                            <option value="Books">Books</option>
                            <option value="Others">Others</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="condition" class="form-label">Condition</label>
                        <select class="form-select" id="condition">
                            <option value="NEW">New</option>
                            <option value="LIKE_NEW">Like New</option>
                            <option value="GOOD" selected>Good</option>
                            <option value="FAIR">Fair</option>
                            <option value="POOR">Poor</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="city" class="form-label required">City</label>
                        <input type="text" class="form-control" id="city" placeholder="eg: Kaloor, Kochi" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="pincode" class="form-label required">Pincode</label>
                        <input type="text" class="form-control" id="pincode" required>
                    </div>
                </div>

                <!-- Price Field (Visible only for SELL type) -->
                <div class="row mb-3" id="priceField" style="display: none;">
                    <div class="col-md-6">
                        <label for="price" class="form-label required">Price (₹)</label>
                        <div class="input-group">
                            <span class="input-group-text">₹</span>
                            <input type="number" class="form-control" id="price" min="1" step="0.01" placeholder="Enter price">
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Item Image</label>
                    <input type="file" class="form-control" id="imageUpload" multiple accept="image/*">
                    <div class="preview-container" id="imagePreview"></div>
                    <div class="form-text">Chosen image will be used as the main image.</div>
                </div>

                <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                    <button type="button" class="btn btn-outline-secondary me-md-2" onclick="window.history.back()">Cancel</button>
                    <button type="submit" class="btn btn-primary">List Item</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/add-item.js"></script>
</body>
</html>
