<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SwapKart</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Welcome Back!</h1>
            <div id="error-message" class="error-message" style="display: none;"></div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" class="form-control"
                           placeholder="Enter your email" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <div class="password-input">
                        <input type="password" id="password" name="password"
                               class="form-control" placeholder="Enter your password"
                               required autocomplete="current-password">
                        <button type="button" id="togglePassword" class="btn-icon"
                                aria-label="Toggle password visibility">
                            👁️
                        </button>
                    </div>

                    <div class="form-check">
                        <input type="checkbox" id="rememberMe" name="rememberMe" class="form-check-input">
                        <label for="rememberMe" class="form-check-label">Remember me</label>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="loginButton">
                    <span class="button-text">Login</span>
                    <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true" style="display: none;"></span>
                </button>

                <div class="auth-footer">
                    <p>Don't have an account? <a href="/register">Register here</a></p>
                    <p><a href="/forgot-password">Forgot password?</a></p>
                </div>
            </form>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
