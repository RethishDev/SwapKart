<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1"> <!-- Added for responsive/mobile -->
    <title>Item Details | SwapKart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin.css">
    <style>
        /* Page layout consistent with other pages */
        body { background: #f8f9fa; }
        header { background-color: #0c1b33; color: white; padding: 12px 20px; }
        .logo { font-weight: 700; font-size: 20px; }
        .item-detail-container { max-width: 1100px; margin: 28px auto; display: flex; gap: 24px; align-items: flex-start; }
        .item-image { flex: 0 0 420px; }
        .item-image img { width: 100%; height: 420px; object-fit: cover; border-radius: 8px; background: #fff; }
        .thumbs { display:flex; gap:8px; margin-top:8px; }
        .thumbs img { width:72px; height:72px; object-fit:cover; border-radius:6px; cursor:pointer; border:2px solid transparent; }
        .thumbs img.active { border-color:#0d6efd; }
        .item-info { flex: 1; }
        .rating-display .fa-star { color: #ffc107; }
        .rating-score { font-size: 1.25rem; font-weight: 700; }
        .seller-card { border-radius: 8px; background: white; padding: 12px; }
        .ratings-section .review-item + .review-item { border-top: 1px solid #eee; padding-top: 10px; margin-top: 10px; }
        .btn-primary { background-color: #0d6efd; border-color: #0d6efd; }

        /* Action buttons layout: desktop inline, mobile stacked */
        .action-buttons { display: flex; gap: 10px; }
        .action-buttons .btn { white-space: nowrap; }

        /* MOBILE RESPONSIVE ADJUSTMENTS */
        @media (max-width: 768px) {
            .item-detail-container {
                flex-direction: column;
                max-width: 95%;
                margin: 16px auto;
                gap: 16px;
            }
            .item-image { flex: 0 0 auto; width: 100%; }
            .item-image img { width: 100%; height: auto; max-height: 60vh; }
            .item-info { width: 100%; }
            .rating-score { font-size: 1rem; }
            /* Make action buttons full-width stacked on mobile */
            .action-buttons { display: grid; grid-template-columns: 1fr; gap: 8px; }
            .action-buttons .btn { width: 100%; }
            /* Thumbnails scroll horizontally on small screens */
            .thumbs { overflow-x: auto; }
            .thumbs img { flex: 0 0 auto; }
            /* Reduce paddings for compact view */
            .seller-card { padding: 10px; }
            .ratings-section { padding-bottom: 8px; }
            header { padding: 10px; }
            .logo { font-size: 18px; }
        }

        /* Tablet adjustments */
        @media (min-width: 769px) and (max-width: 1024px) {
            .item-image img { height: 360px; }
            .item-detail-container { gap: 18px; }
        }
    </style>
</head>
<body>
<header class="d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center gap-3">
        <div class="logo text-white">SwapKart</div>
        <nav class="d-none d-md-flex align-items-center gap-3">
            <a href="/items.html" class="text-white text-decoration-none">Browse</a>
            <a href="/my-items.html" class="text-white text-decoration-none">My Items</a>
            <a href="/profile.html" class="text-white text-decoration-none">Profile</a>
        </nav>
    </div>
    <div>
        <a href="/" class="text-white text-decoration-none">Home</a>
    </div>
</header>

<main class="item-detail-container">
    <div class="item-image bg-white p-3 rounded shadow-sm">
        <img id="itemImage" src="/images/default-item.svg" alt="Item Image">
        <!-- Thumbnails (will be populated if multiple images present) -->
        <div class="thumbs mt-2" id="imageThumbs" aria-hidden="false">
            <!-- Example thumbnails inserted by JS when imageUrls present -->
        </div>
    </div>

    <div class="item-info">
        <h2 id="itemTitle">Loading...</h2>
        <div class="d-flex align-items-center gap-3 mb-2">
            <div class="rating-display">
                <div class="d-flex align-items-center">
                    <div class="me-2">
                        <span class="rating-score" id="averageRating">0.0</span>
                        <span class="text-muted" id="ratingCount">(0)</span>
                    </div>
                    <div class="text-muted">Seller rating</div>
                </div>
            </div>
            <div>
                <button class="btn btn-outline-primary btn-sm" id="messageSellerBtn">Message Seller</button>
            </div>
        </div>

        <div class="d-flex align-items-baseline gap-3 mb-3">
            <div class="fs-4 fw-bold text-success" id="itemPrice">₹0</div>
            <div class="text-muted" id="itemLocation"></div>
        </div>

        <p id="itemDescription" class="mb-4">Loading description...</p>

        <div class="seller-card mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <div class="fw-bold" id="sellerName">Seller</div>
                    <div class="text-muted small" id="sellerContact"></div>
                </div>
                <div class="text-end">
                    <div class="text-muted small">Member since</div>
                    <div id="sellerSince" class="small"></div>
                </div>
            </div>
        </div>

        <div class="ratings-section">
            <h5>Ratings & Reviews</h5>
            <div id="ratingsContainer" class="mt-3">
                <div class="text-muted">Loading reviews...</div>
            </div>
        </div>
    </div>
</main>

<footer class="text-center py-3 mt-4 bg-white">
    <div class="container">&copy; 2025 SwapKart</div>
</footer>

<!-- Rating Modal: If user has a transactionId (hidden input), allow posting rating to /api/ratings/transaction/{transactionId} -->
<div class="modal fade" id="ratingModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Rate this Seller</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="ratingItemId" value="">
                <input type="hidden" id="ratingTransactionId" value="">

                <div class="mb-3 text-center">
                    <div class="rating-stars" style="font-size: 2rem; color: #ddd;">
                        <i class="fa fa-star star" data-rating="1"></i>
                        <i class="fa fa-star star" data-rating="2"></i>
                        <i class="fa fa-star star" data-rating="3"></i>
                        <i class="fa fa-star star" data-rating="4"></i>
                        <i class="fa fa-star star" data-rating="5"></i>
                    </div>
                    <div class="text-muted mt-1">
                        <span id="ratingText">Tap to rate</span>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="ratingComment" class="form-label">Your review (optional)</label>
                    <textarea class="form-control" id="ratingComment" rows="3" placeholder="Share your experience..."></textarea>
                </div>
                <div id="ratingInfo" class="text-muted small"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="submitRatingBtn">Submit Rating</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Helper utilities
    function qs(sel, parent=document) { return parent.querySelector(sel); }
    function qsa(sel, parent=document) { return Array.from(parent.querySelectorAll(sel)); }
    function getAuthHeader() { const t = localStorage.getItem('token'); return t ? { 'Authorization': 'Bearer ' + t } : {}; }
    function getParam(name) { const url = new URL(window.location.href); return url.searchParams.get(name); }

    document.addEventListener('DOMContentLoaded', async () => {
        const itemId = getParam('id') || qs('#ratingItemId').value || null;
        if (!itemId) {
            alert('No item id provided');
            return;
        }

        qs('#ratingItemId').value = itemId;

        try {
            const headers = { 'Content-Type': 'application/json', ...getAuthHeader() };

            // Fetch item details
            const res = await fetch(`/api/items/${itemId}`, { headers });
            if (!res.ok) throw new Error('Failed to load item');
            const item = await res.json();

            // Map item fields safely
            const title = item.title || item.name || item.itemName || 'Item';
            const description = item.description || item.itemDescription || '';
            const price = item.price != null ? item.price : (item.amount || 0);
            const image = (item.imageUrls && item.imageUrls.length) ? item.imageUrls[0] : (item.image || item.itemImage || '/images/default-item.svg');
            const city = item.city || item.location || '';

            qs('#itemTitle').textContent = title;
            qs('#itemDescription').textContent = description;
            qs('#itemPrice').textContent = price ? '₹' + Number(price).toLocaleString('en-IN') : 'Price not available';
            qs('#itemImage').src = image;
            qs('#itemLocation').textContent = city ? `· ${city}` : '';

            // Populate thumbnails if multiple images
            const thumbsContainer = qs('#imageThumbs');
            if (thumbsContainer && item.imageUrls && item.imageUrls.length > 0) {
                thumbsContainer.innerHTML = '';
                item.imageUrls.forEach((url, idx) => {
                    const img = document.createElement('img');
                    img.src = url; img.alt = `Image ${idx+1}`;
                    if (idx === 0) img.classList.add('active');
                    img.addEventListener('click', () => {
                        qs('#itemImage').src = url;
                        qsa('#imageThumbs img').forEach(i => i.classList.remove('active'));
                        img.classList.add('active');
                    });
                    thumbsContainer.appendChild(img);
                });
            }

            // Seller info
            const seller = item.user || item.seller || item.owner || null;
            const sellerId = seller?.id || item.sellerId || item.userId || null;
            const sellerName = seller?.name || seller?.username || item.sellerName || 'Seller';
            const sellerEmail = seller?.email || item.sellerEmail || '';

            qs('#sellerName').textContent = sellerName;
            qs('#sellerContact').textContent = sellerEmail ? sellerEmail : '';
            // store sellerId on the element for later use
            if (sellerId) qs('#sellerName').dataset.sellerId = sellerId;

            // Populate seller since if available
            if (seller && (seller.createdAt || seller.createdDate)) {
                const d = new Date(seller.createdAt || seller.createdDate);
                if (!isNaN(d.getTime())) qs('#sellerSince').textContent = d.toLocaleDateString();
            }

            // Load seller rating summary and reviews if sellerId available
            if (sellerId) {
                await loadSellerRating(sellerId);
                await loadSellerReviews(sellerId);
            } else {
                qs('#ratingsContainer').innerHTML = '<div class="text-muted">Seller information not available</div>';
            }

            // Rating modal: if URL contains transactionId, enable submit
            const txId = getParam('transactionId') || '';
            qs('#ratingTransactionId').value = txId;
            if (!txId) {
                qs('#ratingInfo').textContent = 'You can only rate after completing a transaction. If you have a transaction id, add ?transactionId=XYZ to the URL.';
            } else {
                qs('#ratingInfo').textContent = '';
            }

        } catch (err) {
            console.error(err);
            alert('Failed to load item details');
        }

        // Wire up buttons (simple behaviours)
        const messageSellerBtn = qs('#messageSellerBtn');
        if (messageSellerBtn) messageSellerBtn.addEventListener('click', () => {
            const sellerId = qs('#sellerName').dataset.sellerId || '';
            // Fallback: go to messages page
            window.location.href = '/messages';
        });

        const buyBtn = qs('#buyBtn'); if (buyBtn) buyBtn.addEventListener('click', () => { alert('Buy flow not implemented in this demo'); });
        const swapBtn = qs('#swapBtn'); if (swapBtn) swapBtn.addEventListener('click', () => { const itemId = qs('#ratingItemId').value; window.location.href = `/swap-item.html?itemId=${encodeURIComponent(itemId)}`; });
        const donateBtn = qs('#donateBtn'); if (donateBtn) donateBtn.addEventListener('click', () => { const itemId = qs('#ratingItemId').value; window.location.href = `/donate-item.html?itemId=${encodeURIComponent(itemId)}`; });

        // Rating modal star behaviour
        qsa('.rating-stars .star').forEach(star => {
            star.addEventListener('click', (e) => {
                const r = Number(e.currentTarget.dataset.rating || 0);
                qsa('.rating-stars .star').forEach(s => s.style.color = s.dataset.rating <= r ? '#ffc107' : '#ddd');
                qs('#ratingText').textContent = `${r}/5`;
                qs('#ratingText').dataset.selected = r;
            });
        });

        // Submit rating
        qs('#submitRatingBtn').addEventListener('click', async () => {
            const txId = qs('#ratingTransactionId').value;
            const score = Number(qs('#ratingText').dataset.selected || 0);
            const comment = qs('#ratingComment').value || '';

            if (!txId) {
                alert('You can only submit a rating after a transaction (transaction id required).');
                return;
            }
            if (!score || score < 1) { alert('Please select a rating (1-5)'); return; }

            try {
                const headers = { 'Content-Type': 'application/json', ...getAuthHeader() };
                const response = await fetch(`/api/ratings/transaction/${txId}`, {
                    method: 'POST', headers, body: JSON.stringify({ score, comment })
                });
                if (!response.ok) {
                    const txt = await response.text(); throw new Error(txt || 'Failed to submit rating');
                }
                alert('Rating submitted. Thank you!');
                // refresh seller reviews
                const sellerId = qs('#sellerName').dataset.sellerId;
                if (sellerId) await loadSellerReviews(sellerId);
                const modal = bootstrap.Modal.getInstance(document.getElementById('ratingModal'));
                if (modal) modal.hide();
            } catch (e) {
                console.error(e); alert('Failed to submit rating: ' + e.message);
            }
        });
    });

    async function loadSellerRating(sellerId) {
        try {
            const headers = { ...getAuthHeader() };
            const [avgResp, cntResp] = await Promise.all([
                fetch(`/api/ratings/user/${sellerId}/average`, { headers }),
                fetch(`/api/ratings/user/${sellerId}/count`, { headers })
            ]);
            const avg = avgResp.ok ? await avgResp.json() : 0.0;
            const cnt = cntResp.ok ? await cntResp.json() : 0;
            qs('#averageRating').textContent = (avg != null) ? Number(avg).toFixed(1) : '0.0';
            qs('#ratingCount').textContent = `(${cnt})`;
        } catch (e) {
            console.warn('Failed to load seller rating', e);
            qs('#averageRating').textContent = '0.0';
            qs('#ratingCount').textContent = '(0)';
        }
    }

    async function loadSellerReviews(sellerId) {
        try {
            const headers = { ...getAuthHeader() };
            const res = await fetch(`/api/ratings/for-user/${sellerId}`, { headers });
            if (!res.ok) { qs('#ratingsContainer').innerHTML = '<div class="text-muted">No reviews available</div>'; return; }
            const reviews = await res.json();
            if (!Array.isArray(reviews) || reviews.length === 0) {
                qs('#ratingsContainer').innerHTML = '<div class="text-muted">No reviews yet</div>';
                return;
            }
            const html = reviews.map(r => `
                <div class="review-item">
                    <div class="d-flex justify-content-between">
                        <div>
                            <strong>${escapeHtml(r.raterName || r.raterId)}</strong>
                            <div class="text-muted small">${escapeHtml(r.comment || '')}</div>
                        </div>
                        <div class="text-end">
                            <div class="fw-bold text-warning">${r.score}/5</div>
                            <div class="text-muted small">${formatDate(r.createdAt)}</div>
                        </div>
                    </div>
                </div>
            `).join('');
            qs('#ratingsContainer').innerHTML = html;
        } catch (e) {
            console.error('Failed to load reviews', e);
            qs('#ratingsContainer').innerHTML = '<div class="text-muted">Failed to load reviews</div>';
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    function formatDate(iso) {
        if (!iso) return '';
        try { return new Date(iso).toLocaleString(); } catch(e) { return iso; }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
