<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Messages - SwapKart</title>
    <link rel="stylesheet" href="/css/messages.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- WebSocket Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
    <script>
        function initializeWebSocket() {
            // Your WebSocket initialization code here
            console.log('Initializing WebSocket with Stomp version:', Stomp.VERSION);
        }
    </script>
</head>
<body>
<div class="messages-container">
    <!-- Sidebar with conversations -->
    <div class="conversations-sidebar">
        <div class="sidebar-header">
            <a href="/" class="logo">
                <img src="https://raw.githubusercontent.com/RethishDev/swapkart-assets/main/swapkart-logo.png" alt="SwapKart Logo">
            </a>
            <h2>Messages</h2>
            <button class="new-message-btn"><i class="fas fa-edit"></i></button>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Search conversations...">
            <i class="fas fa-search"></i>
        </div>
        <div class="conversations-list" id="conversationsList">
            <!-- Conversations will be loaded here -->
            <div class="conversation-placeholder">
                <i class="fas fa-comments"></i>
                <p>No conversations yet</p>
            </div>
        </div>
    </div>

    <!-- Chat area -->
    <div class="chat-area">
        <div class="chat-header">
            <!-- Mobile back button (hidden on desktop) -->
            <button class="mobile-back-btn" aria-label="Back to conversations" title="Back"><i class="fas fa-arrow-left"></i></button>

            <div class="chat-partner-info">
                <img id="chatPartnerAvatar" src="/images/default-avatar.svg" alt="User">
                <div>
                    <h3 id="chatPartnerName">Select a conversation</h3>
                    <p id="chatPartnerStatus">Online</p>
                </div>
            </div>
            <div class="chat-actions">
                <button><i class="fas fa-phone"></i></button>
                <button><i class="fas fa-video"></i></button>
                <button><i class="fas fa-ellipsis-v"></i></button>
            </div>
        </div>

        <div class="messages" id="messagesContainer">
            <div class="no-chat-selected">
                <i class="fas fa-comment-alt"></i>
                <h3>Select a conversation to start chatting</h3>
                <p>Or start a new conversation with a user</p>
            </div>
        </div>

        <div class="message-input-container" style="display: none;">
            <div class="message-input">
                <button><i class="fas fa-paperclip"></i></button>
                <input type="text" id="messageInput" placeholder="Type a message...">
                <button id="sendMessageBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</div>

<script src="/js/messages.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        initializeWebSocket();
        // Initialize message badge
        updateMessagesBadge();
        setInterval(updateMessagesBadge, 30000);
    });
</script>
</body>
</html>
