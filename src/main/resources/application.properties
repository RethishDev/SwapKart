spring.application.name=SwapKart

spring.profiles.active=loc

server.address=0.0.0.0

# Server Configuration
server.port=${PORT_8903}
server.servlet.context-path=/
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Error Handling
server.error.whitelabel.enabled=false
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=ON_PARAM
server.error.path=/error

# Static Resources Configuration
# Add file: prefix and ensure the path is correctly formatted for Windows
file.upload-dir=C:/SwapKart/uploads/items/
spring.web.resources.static-locations=classpath:/static/,file:C:/SwapKart/uploads/items/


# Enable resource handling and Maximum file size for uploads
spring.mvc.static-path-pattern=/**
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false
spring.web.resources.chain.enabled=true
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**
spring.web.resources.chain.strategy.fixed.enabled=true
spring.web.resources.chain.strategy.fixed.paths=/js/**,/css/**,/images/**
spring.web.resources.chain.strategy.fixed.version=v1

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=false
spring.flyway.clean-on-validation-error=true
spring.flyway.validate-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=swapkartdb
spring.flyway.user=postgres
spring.flyway.password=monkeydonkey
spring.flyway.url=jdbc:postgresql://localhost:5432/postgres

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# HikariCP Configuration (default in Spring Boot)
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=SpringBootHikariCP
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML5
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html

# Disable default security headers that might interfere with static content
security.require-ssl=false
security.basic.enabled=false

# JWT Configuration
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# Security configuration is now handled by DefaultAdminConfig

# CORS Allowed Origins (comma-separated)
cors.allowed-origins=http://localhost:8081
,http://localhost:4200,http://localhost:8909

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.swapkart=DEBUG

# Enable multipart
spring.servlet.multipart.enabled=true

# Set upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# Optional: set temp directory
spring.servlet.multipart.location=${java.io.tmpdir}

# Optional: set disk threshold before buffering in memory
spring.servlet.multipart.file-size-threshold=2MB


