<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SwapKart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .reset-password-container {
            max-width: 450px;
            width: 100%;
            padding: 2rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="reset-password-container">
        <div class="text-center mb-4">
            <h2>Reset Your Password</h2>
            <p class="text-muted">Enter your new password below</p>
        </div>

        <form id="resetPasswordForm" onsubmit="return false;">
            <input type="hidden" id="token" th:value="${token}">
            <div class="mb-3">
                <label for="newPassword" class="form-label">New Password</label>
                <input type="password" class="form-control" id="newPassword" required minlength="8">
            </div>
            <div class="mb-3">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirmPassword" required minlength="8">
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary" id="submitButton">
                    <span class="spinner-border spinner-border-sm d-none" id="spinner" role="status" aria-hidden="true"></span>
                    <span id="buttonText">Reset Password</span>
                </button>
                <a href="/login" class="btn btn-outline-secondary mt-2">Back to Login</a>
            </div>
        </form>

        <div id="successMessage" class="alert alert-success mt-3 d-none" role="alert">
            Your password has been reset successfully! You will be redirected to login page in 3 seconds...
        </div>

        <div id="errorMessage" class="alert alert-danger mt-3 d-none" role="alert"></div>
    </div>
</div>

<script>
    document.getElementById('resetPasswordForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const token = document.getElementById('token').value;
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');
        const submitButton = document.getElementById('submitButton');
        const spinner = document.getElementById('spinner');
        const buttonText = document.getElementById('buttonText');

        // Reset messages and show loading state
        successMessage.classList.add('d-none');
        errorMessage.classList.add('d-none');
        submitButton.disabled = true;
        spinner.classList.remove('d-none');

        // Validate passwords match
        if (newPassword !== confirmPassword) {
            errorMessage.textContent = 'Passwords do not match';
            errorMessage.classList.remove('d-none');
            // Reset button state if validation fails
            submitButton.disabled = false;
            spinner.classList.add('d-none');
            buttonText.textContent = 'Reset Password';
            return;
        }

        // Make API call to reset password
        fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                token: token,
                newPassword: newPassword
            })
        })
        .then(response => {
            if (!response.ok) {
                return response.json().then(err => {
                    throw new Error(err.message || 'Failed to reset password');
                });
            }
            return response.json();
        })
        .then(() => {
            successMessage.classList.remove('d-none');
            document.getElementById('resetPasswordForm').reset();
            // Redirect to login page after 3 seconds
            setTimeout(() => {
                window.location.href = '/login';
            }, 3000);
        })
        .catch(error => {
            console.error('Error:', error);
            errorMessage.textContent = error.message || 'An error occurred while resetting your password';
            errorMessage.classList.remove('d-none');
        })
        .finally(() => {
            // Reset button state
            submitButton.disabled = false;
            spinner.classList.add('d-none');
            buttonText.textContent = 'Reset Password';
        });
    });
</script>
