<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - SwapKart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .forgot-password-container {
            max-width: 450px;
            width: 100%;
            padding: 2rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }
        .forgot-password-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .forgot-password-form {
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="forgot-password-container">
            <div class="forgot-password-logo">
                <h2>Forgot Password</h2>
                <p class="text-muted">Enter your email to reset your password</p>
            </div>
            
            <div class="forgot-password-form">
                <form id="forgotPasswordForm" onsubmit="return false;">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                        <div class="form-text">We'll send a password reset link to your email.</div>
                    </div>
                    <button type="submit" class="btn btn-primary" id="submitButton">
                        <span class="spinner-border spinner-border-sm d-none" id="spinner" role="status" aria-hidden="true"></span>
                        <span id="buttonText">Send Reset Link</span>
                    </button>
                </form>
                
                <div class="text-center mt-3">
                    <a href="/login" class="text-decoration-none">Back to Login</a>
                </div>
            </div>
            
            <div id="successMessage" class="alert alert-success mt-3 d-none" role="alert">
                Password reset link has been sent to your email.
            </div>
            
            <div id="errorMessage" class="alert alert-danger mt-3 d-none" role="alert">
                Error sending reset link. Please try again.
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const successMessage = document.getElementById('successMessage');
            const errorMessage = document.getElementById('errorMessage');
            const submitButton = document.getElementById('submitButton');
            const spinner = document.getElementById('spinner');
            const buttonText = document.getElementById('buttonText');

            // Reset messages and show loading state
            successMessage.classList.add('d-none');
            errorMessage.classList.add('d-none');
            submitButton.disabled = true;
            spinner.classList.remove('d-none');
            buttonText.textContent = 'Sending...';

            // Make API call to the backend
            fetch('/api/auth/forgot-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email: email })
            })
            .then(response => {
                if (!response.ok) {
                    return response.text().then(text => {
                        throw new Error(text || 'Failed to send reset link');
                    });
                }
                return response.text();
            })
            .then(() => {
                successMessage.classList.remove('d-none');
                document.getElementById('forgotPasswordForm').reset();
            })
            .catch(error => {
                console.error('Error:', error);
                errorMessage.textContent = error.message || 'An error occurred while processing your request';
                errorMessage.classList.remove('d-none');
            })
            .finally(() => {
                // Reset button state
                submitButton.disabled = false;
                spinner.classList.add('d-none');
                buttonText.textContent = 'Send Reset Link';
            });
        });
    </script>
</body>
</html>
