# Test Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# H2 Console (only for testing)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.swapkart=DEBUG

# JWT Configuration
jwt.secret=testSecretKey1234567890123456789012345678901234567890
jwt.expiration=86400000

# Server port for tests
server.port=0  # Random port for tests

# Disable CSRF for testing
spring.security.csrf.enabled=false

# Allow CORS for testing
cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:8909
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Disable security for actuator endpoints in tests
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Disable security for H2 console in tests
spring.h2.console.settings.web-allow-others=true
